plugins {
    id 'com.android.application'
}

android {
    namespace 'org.heartive.skullbrowser'
    compileSdk 34

    defaultConfig {
        applicationId "org.heartive.skullbrowser"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
