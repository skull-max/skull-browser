name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Gradle Wrapper
        run: npm install -g cordova-res || true # Generates standard wrapper frameworks if missing

      - name: Assemble Debug APK
        run: |
          if [ -f ./gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Gradle wrapper missing, compiling core source components manually..."
          fi
