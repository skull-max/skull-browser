name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Unzip Clean Routine
        run: |
          mkdir -p project_unpacked
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip -d project_unpacked
            echo "Unpacked your zip file successfully."
          else
            echo "No zip file found."
          fi

      - name: Reconstruct Native Android File Trees
        run: |
          # 1. Create sterile Android target folders
          mkdir -p app/src/main/java/org/heartive/skullbrowser
          mkdir -p app/src/main/res/layout

          # 2. Extract your Java and layout files out of the zip archive pool
          find project_unpacked/ -name "MainActivity.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "MyWebViewClient.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "SkullVpnService.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "activity_main.xml" -exec cp {} app/src/main/res/layout/ \; || true

          # 3. Write a sterile manifest file from scratch
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              package="org.heartive.skullbrowser">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:label="Skull Browser"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar">

                  <activity 
                      android:name="org.heartive.skullbrowser.MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service 
                      android:name="org.heartive.skullbrowser.SkullVpnService"
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>

              </application>
          </manifest>
          EOF

          # 4. Generate system environment configuration components
          echo "include ':app'" > settings.gradle

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'org.heartive.skullbrowser'
              compileSdk 34
              defaultConfig {
                  applicationId "org.heartive.skullbrowser"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # === THE DIGITAL PRESSURE WASHER ===
          # Forcefully strips out hidden keyboard carriage returns (\r) from every file
          find . -type f -name "*.xml" -exec sed -i 's/\r$//' {} \;
          find . -type f -name "*.gradle" -exec sed -i 's/\r$//' {} \;
          find . -type f -name "*.properties" -exec sed -i 's/\r$//' {} \;
          find . -type f -name "*.java" -exec sed -i 's/\r$//' {} \;

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Compile and Assemble Debug APK
        run: |
          # The clean, sterile text layout files will now compile flawlessly
          gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Skull-Browser-Installer
          path: "**/build/outputs/apk/debug/*.apk"
