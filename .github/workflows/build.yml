name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Administrative Bypass: Tells GitHub we acknowledge the Node upgrade
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          if [ -f *.zip ]; then
            unzip -o *.zip
            echo "Project unpacked successfully."
          fi

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Debug App Installer
        run: |
          # Dynamically initializes a lightweight Android build wrapper
          gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Skull-Browser-Installer
          path: app/build/outputs/apk/debug/*.apk
