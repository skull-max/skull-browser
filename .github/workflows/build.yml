name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Forces GitHub's internal engine to use Node 24 to completely clear the warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          mkdir -p project_unpacked
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip -d project_unpacked
            echo "Unpacked your zip file successfully."
          else
            echo "No zip file found."
          fi

      - name: Reconstruct Native Android File Trees
        run: |
          # 1. Create strict, required Android package folders
          mkdir -p app/src/main/java/org/heartive/skullbrowser
          mkdir -p app/src/main/res/layout

          # 2. Dynamically search inside your unzipped folders for your files and place them correctly
          find project_unpacked/ -name "MainActivity.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "MyWebViewClient.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "SkullVpnService.java" -exec cp {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "activity_main.xml" -exec cp {} app/src/main/res/layout/ \; || true
          find project_unpacked/ -name "AndroidManifest.xml" -exec cp {} app/src/main/ \; || true

          # 3. Create missing settings control script
          echo "include ':app'" > settings.gradle

          # 4. Generate master gradle build file
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # 5. Generate app module build script layout configuration
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'org.heartive.skullbrowser'
              compileSdk 34
              defaultConfig {
                  applicationId "org.heartive.skullbrowser"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Compile and Assemble Debug APK
        run: |
          # Injects the modern standalone builder engine directly into the project workspace
          gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Skull-Browser-Installer
          path: app/build/outputs/apk/debug/*.apk
