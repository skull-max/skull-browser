name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Unzip Clean Routine
        run: |
          mkdir -p project_unpacked
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip -d project_unpacked
            echo "Zip elements extracted successfully."
          else
            echo "No zip package detected."
          fi

      - name: Reconstruct Native Android File Trees
        run: |
          # Create strict target folders
          mkdir -p app/src/main/java/org/heartive/skullbrowser
          mkdir -p app/src/main/res/layout

          # Search dynamically inside the unpacked zip folders for your files
          find project_unpacked/ -name "MainActivity.java" -exec mv {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "MyWebViewClient.java" -exec mv {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "SkullVpnService.java" -exec mv {} app/src/main/java/org/heartive/skullbrowser/ \; || true
          find project_unpacked/ -name "activity_main.xml" -exec mv {} app/src/main/res/layout/ \; || true
          find project_unpacked/ -name "AndroidManifest.xml" -exec mv {} app/src/main/ \; || true

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Compile and Assemble Debug APK
        run: |
          # Use the pre-installed system Gradle engine to build your code 
          gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Skull-Browser-Installer
          path: app/build/outputs/apk/debug/*.apk
